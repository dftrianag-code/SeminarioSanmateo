services:

  api:
    image: fintech-nova:1.0
    container_name: fintech-api

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: sqlite:///./data/app.db

    volumes:
      - ./data:/app/data

    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fintech-redis

    ports:
      - "6379:6379"

    restart: unless-stopped