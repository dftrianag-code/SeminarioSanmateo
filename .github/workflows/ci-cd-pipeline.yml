name: CI/CD Pipeline - FinTech Nova

on:
  push:
    branches:
      - main

jobs:
  build-and-security:

    runs-on: ubuntu-latest

    steps:

    - name: Descargar código (Checkout)
      uses: actions/checkout@v4

    - name: Configurar Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Actualizar pip
      run: |
        python -m pip install --upgrade pip

    - name: Instalar dependencias
      run: |
        pip install -r fintech-nova-api/requirements.txt

    - name: Auditoría de seguridad con pip-audit
      run: |
        pip install pip-audit
        pip-audit --requirement requirements.txt

    - name: Construir imagen Docker
      run: |
        docker build -t fintech-nova:${{ github.sha }} fintech-nova-api/

